<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact - ViralContent Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow">
        <h1 class="text-3xl font-bold mb-4">Contact</h1>
        <p class="text-gray-700 mb-6">
            Une suggestion ? Ecrivez-nous !
        </p>
        
        <form onsubmit="event.preventDefault(); alert('Message envoye !');" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" required class="mt-1 block w-full rounded-md border p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Message</label>
                <textarea rows="4" required class="mt-1 block w-full rounded-md border p-2"></textarea>
            </div>
            <button type="submit" class="bg-purple-600 text-white px-4 py-2 rounded-md">
                Envoyer
            </button>
        </form>
        
        <p class="text-gray-600 mt-6">
            Email : contact@viralcontent-pro.com
        </p>
        
        <a href="index.html" class="text-purple-600 hover:underline mt-4 inline-block">Retour</a>
    </div>
</body>
</html>
